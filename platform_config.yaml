platform:
  name: Polymarket Agent Dashboard
  version: 1.0.0
  refresh_interval_minutes: 30
  log_level: info
  max_log_retention_days: 30
budgets:
  monthly_total_usd: 50.0
  daily_limit_usd: 5.0
  per_agent_daily_usd: 1.0
  alert_threshold_percent: 80
  auto_pause_on_budget_exceeded: true
alerts:
  enabled: true
  on_budget_warning: true
  on_circuit_breaker: true
  on_new_suggestion: false
  on_trade_executed: true
  on_trade_settled: true
  on_agent_error: true
  on_daily_summary: true
  daily_summary_hour: 20
circuit_breaker:
  max_consecutive_losses: 3
  pause_hours: 24
  auto_reset: true
model_routing:
  analysis: claude-opus-4-6
  parsing: gemini-flash
  sentiment: haiku
  summarization: haiku
  default: claude-sonnet
cache:
  enabled: true
  ttl_minutes: 30
  max_entries: 1000
trading:
  market_filters:
    min_price: 0.05
    max_price: 0.9
    min_volume_24h: 5000
    min_liquidity: 5000
    min_orderbook_depth: 0
  mode: full-auto
  capital_usd: 1400
  limits:
    max_position_pct: 3
    max_daily_loss_usd: 20.0
    min_edge: 0.05
    min_trade_usd: 1.0
  category_blacklist: []
  keyword_blacklist:
    - "Democratic presidential nomination"
    - "Democratic vice presidential nomination"
  deduplication:
    enabled: true
    cooldown_hours: 72
    max_attempts_per_market: 1
    check_pending_suggestions: true
  rebuy_cooldown_days: 14
  weather_min_edge: 0.15
  analyst_suggestions:
    min_edge: 0.08
    min_liquidity: 5000
    max_amount_usd: 5.0
  hedging:
    enabled: false
    profit_threshold_pct: 15
    hedge_amount_pct: 50
    min_profit_usd: 1.0
    cooldown_minutes: 60
  cashout:
    enabled: true
    sell_pct: 100
    min_profit_pct: 5
    min_profit_usd: 0.05
    max_hold_hours: 120
    force_sell_profit_pct: 2
    cooldown_minutes: 15
    tiered_targets:
    - price_range:
      - 0.0
      - 0.05
      profit_target: 3
    - price_range:
      - 0.05
      - 0.2
      profit_target: 12
    - price_range:
      - 0.2
      - 0.5
      profit_target: 6
    - price_range:
      - 0.5
      - 0.9
      profit_target: 3
polymarket:
  markets_limit: 100
  min_volume_usd: 5000
  min_liquidity_usd: 3000
  categories:
  - politics
  - crypto
  - sports
  - science
  - economics
  - weather
  - entertainment
scheduler:
  market_refresh:
    enabled: true
    interval_minutes: 15
  sentiment_update:
    enabled: true
    interval_minutes: 60
  cost_aggregation:
    enabled: true
    interval_minutes: 60
  agent_health_check:
    enabled: true
    interval_minutes: 15
  chief_analysis_hour: 19
  analyst_hour: 8
  ml_retrain:
    enabled: true
    interval_days: 1
  strategy_evaluation:
    enabled: true
    interval_minutes: 15
  trader_cycle:
    enabled: true
    interval_minutes: 2
  daily_summary:
    enabled: true
    hour: 20
  pattern_scanner_hour: 9
  settlement:
    enabled: true
    interval_minutes: 30
  weather_edge:
    enabled: true
    interval_minutes: 30
  snapshot_cleanup:
    enabled: true
    interval_hours: 24
strategy:
  max_active_strategies: 20
  min_confidence_score: 0.5
  retire_after_trades: 50
  retire_on_drawdown_pct: 15
gamma_api:
  base_url: https://gamma-api.polymarket.com
  markets_limit: 100
  min_volume_usd: 5000
  min_liquidity_usd: 3000
  timeout_seconds: 30
  tag_slugs:
  - weather
  - climate
mcp:
  enabled: true
  bot_api_internal_url: http://polymarket-bot:8000
risk_management:
  stop_loss_pct: -25
  max_hold_days_losing: 7
  dead_market_bid: 0.005
  dead_market_hours: 24
diversification:
  max_positions_per_category: 30
  max_positions_total: 150
  max_exposure_per_category_pct: 25
  preferred_categories:
  - Weather
  - Sports
  - Crypto
  - Politics
  - Science & Tech
  - Economics
arbitrage:
  min_profit_pct: 5.0
  max_settlement_days: 30
  max_outcomes: 20
  min_absolute_profit: 1.0
  max_investment: 25.0
  exclude_from_stoploss: true
edge_sources:
  sports_odds:
    enabled: true
    min_edge: 0.05
    max_amount: 5
  crypto_prob:
    enabled: true
    min_edge: 0.05
    max_amount: 5
  fedwatch:
    enabled: true
    min_edge: 0.05
    max_amount: 5
  cross_platform:
    enabled: true
    min_edge: 0.05
    max_amount: 5
weather_sniper:
  breakeven_enabled: true
  breakeven_trigger_pct: 66
  breakeven_sl_pct: 1
  max_entry_price: 0.93
