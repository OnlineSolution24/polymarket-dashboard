platform:
  name: Polymarket Agent Dashboard
  version: 1.0.0
  refresh_interval_minutes: 30
  log_level: info
  max_log_retention_days: 30
budgets:
  monthly_total_usd: 50.0
  daily_limit_usd: 5.0
  per_agent_daily_usd: 1.0
  alert_threshold_percent: 80
  auto_pause_on_budget_exceeded: true
alerts:
  enabled: true
  on_budget_warning: true
  on_circuit_breaker: true
  on_new_suggestion: false
  on_trade_executed: true
  on_trade_settled: true
  on_agent_error: true
  on_daily_summary: true
  daily_summary_hour: 20
circuit_breaker:
  max_consecutive_losses: 3
  pause_hours: 24
  auto_reset: true
model_routing:
  analysis: claude-sonnet
  parsing: gemini-flash
  sentiment: haiku
  summarization: haiku
  default: claude-sonnet
cache:
  enabled: true
  ttl_minutes: 30
  max_entries: 1000
trading:
  mode: full-auto
  capital_usd: 1000.0
  limits:
    max_position_pct: 5
    max_daily_loss_usd: 50.0
    min_edge: 0.03
    min_trade_usd: 1.0
  category_blacklist: []
  deduplication:
    enabled: true
    cooldown_hours: 24
    max_attempts_per_market: 3
    check_pending_suggestions: true
  rebuy_cooldown_days: 7
  weather_min_edge: 0.15
  analyst_suggestions:
    min_edge: 0.2
    min_liquidity: 50000
    max_amount_usd: 3.0
  hedging:
    enabled: false
    profit_threshold_pct: 15
    hedge_amount_pct: 50
    min_profit_usd: 1.0
    cooldown_minutes: 60
  cashout:
    enabled: true
    sell_pct: 100
    min_profit_pct: 10.0
    min_profit_usd: 0.5
    max_hold_hours: 168
    force_sell_profit_pct: 3
    cooldown_minutes: 30
polymarket:
  markets_limit: 50
  min_volume_usd: 1000
  min_liquidity_usd: 500
  categories:
  - politics
  - crypto
  - sports
  - science
scheduler:
  market_refresh:
    enabled: true
    interval_minutes: 15
  sentiment_update:
    enabled: true
    interval_minutes: 60
  cost_aggregation:
    enabled: true
    interval_minutes: 60
  agent_health_check:
    enabled: true
    interval_minutes: 15
  chief_analysis_hour: 19
  analyst_hour: 8
  ml_retrain:
    enabled: true
    interval_days: 1
  strategy_evaluation:
    enabled: true
    interval_minutes: 15
  trader_cycle:
    enabled: true
    interval_minutes: 5
  daily_summary:
    enabled: true
    hour: 20
  pattern_scanner_hour: 9
  settlement:
    enabled: true
    interval_minutes: 30
  weather_edge:
    enabled: true
    interval_minutes: 10
  snapshot_cleanup:
    enabled: true
    interval_hours: 24
  blockchain_indexer:
    enabled: false
    interval_hours: 6
    max_chunks_per_run: 500
strategy:
  max_active_strategies: 5
  min_confidence_score: 0.5
  retire_after_trades: 50
  retire_on_drawdown_pct: 20
gamma_api:
  base_url: https://gamma-api.polymarket.com
  markets_limit: 100
  min_volume_usd: 1000
  min_liquidity_usd: 500
  timeout_seconds: 30
  tag_slugs:
  - weather
  - climate
mcp:
  enabled: true
  bot_api_internal_url: http://polymarket-bot:8000
